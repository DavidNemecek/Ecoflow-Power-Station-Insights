services:
  collector:
    image: ghcr.io/davidnemecek/ecoflow-power-station-insights:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Default collector (can be overridden via your local `.env` or `docker compose` env):
      #   ECOFLOW_SCRIPT=ecoflow_cells_csv.py
      #   ECOFLOW_SCRIPT=ecoflow_cells_csv_dualExtentionBattery.py
      ECOFLOW_SCRIPT: ${ECOFLOW_SCRIPT:-ecoflow_cells_csv_dualExtentionBattery.py}
      ECOFLOW_ARGS: ${ECOFLOW_ARGS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./output:/data
